<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta charset="utf-8">
    <title>Content Advisor</title>
    <link rel="stylesheet" href="index.css">
    <script
        src="https://experience.adobe.com/solutions/CQ-assets-selectors/static-assets/resources/assets-selectors.js"></script>

    <script>
        let imsInstance = null;

        // Must match the origin registered with the IMS client (IMSS allowlist).
        // See: https://asset-selector-demo.vercel.app  (regex: https://asset-selector-demo\.vercel\.app)
        const APP_ORIGIN = "https://asset-selector-demo.vercel.app";

        // In order to obtain an imsClientId you will need to raise a support ticket with Adobe.
        // Client Id's created via Adobe Developer Console will not work for Content Advisor.
        const imsProps = {
            imsClientId: "aemcs-techaspectamericasbx-assetselector",
            imsScope: "AdobeID,openid,additional_info.projectedProductContext,read_organizations",
            redirectUrl: APP_ORIGIN,
            modalMode: true,
            adobeImsOptions: {
                modalSettings: {
                    allowOrigin: APP_ORIGIN,
                },
                useLocalStorage: true,
            },
            // Optional parameters:
            // modalMode: false, // set to false to open in a full page reload flow
            // onImsServiceInitialized: (service) => {
            //     console.log("onImsServiceInitialized", service);
            // },
            // onAccessTokenReceived: (token) => {
            //     console.log("onAccessTokenReceived", token);
            // },
            // onAccessTokenExpired: () => {
            //     console.log("onAccessTokenError");
            //     // re-trigger sign-in flow
            // },
            // onErrorReceived: (type, msg) => {
            //     console.log("onErrorReceived", type, msg);
            // },
        };

        // Must be called on page load before rendering ContentAdvisor.
        // If your redirectUrl differs from the imsClientId registration, also call this on the redirect page.
        function registerImsAuthService() {
            const registeredTokenService = PureJSSelectors.registerContentAdvisorAuthService(imsProps);
            // registeredTokenService exposes: getAccessToken(), signIn(), signOut(), refreshToken()
            imsInstance = registeredTokenService;
        };

        // Must be register token service before the selectors are rendered.
        registerImsAuthService();

        function onClose() {
            document.getElementById('content-advisor-dialog').close();
        }

        function destinationSelectorOnClose() {
            document.getElementById('destination-selector-dialog').close();
        }

        function handleSelection(selection) {
            console.log('Selected asset:', selection);
            onClose();
        }

        function handleOnConfirm(selection) {
            console.log('Selected path:', selection);
            destinationSelectorOnClose();
        }

        async function renderContentAdvisorWithImsFlow() {
            const container = document.getElementById('content-advisor');
            PureJSSelectors.renderContentAdvisorWithAuthFlow(container, {
                onClose: onClose,
                handleSelection: handleSelection,
                imsOrg: "%%IMS_ORG%%",
                aemTierType: ['delivery', 'author'],
                colorScheme: window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light',
            }, () => {
                document.getElementById('content-advisor-dialog').showModal();
            });
        }

        async function renderDestinationSelectorWithImsFlow() {
            const container = document.getElementById('destination-selector');
            PureJSSelectors.renderDestinationSelectorWithAuthFlow(container, {
                onClose: destinationSelectorOnClose,
                onConfirm: handleOnConfirm,
                colorScheme: window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light',
            }, () => {
                document.getElementById('destination-selector-dialog').showModal();
            });
        }

        async function logoutImsFlow() {
            await imsInstance.signOut();
        }

    </script>
</head>

<body class="content-advisors">
    <div>
        <h3>Vanilla JS Examples</h3>
    </div>
    <div>
        <button onclick="renderContentAdvisorWithImsFlow()">Content Advisor - Select Assets with Ims Flow</button>
    </div>
    <div>
        <button onclick="renderDestinationSelectorWithImsFlow()">Destination Selector - Select Folders with Ims
            Flow</button>
    </div>
    <div>
        <button onclick="location.href='dnd.html'">Content Advisor — Drag &amp; Drop</button>
    </div>
    <div>
        <button onclick="logoutImsFlow()">(Sign Out)</button>
    </div>
    <div>
        <dialog id="content-advisor-dialog">
            <div id="content-advisor" style="height: 100%; width: 100%;"></div>
        </dialog>
    </div>
    <div>
        <dialog id="destination-selector-dialog">
            <div id="destination-selector" style="height: 100%; width: 100%;"></div>
        </dialog>
    </div>
</body>

</html>
